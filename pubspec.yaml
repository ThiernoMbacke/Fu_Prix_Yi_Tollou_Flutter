name: fu_prix_yi_tollou_tay
description: Application de consultation et comparaison des prix des produits au Sénégal
publish_to: 'none' # projet privé
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  flutter_svg: ^2.0.9

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # State Management
  provider: ^6.1.2

  # Backend / Database
  supabase_flutter: ^2.5.0   # Gardé pour Storage/Realtime et lecture données
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0

  # Utils
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  device_info_plus: ^11.0.0
  # Carte et position
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  supabase_flutter: ^2.3.4  
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Si tu ajoutes des images ou assets, tu peux décommenter et adapter
  # assets:
  #   - assets/images/
  
